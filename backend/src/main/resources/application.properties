# Configurações do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/clinica_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=clinica_user
spring.datasource.password=clinica_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Inicialização do banco (chema.sql e data.sql)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Configuração JWT
api.security.token.secret=chave-super-secreta
api.security.token.expiration_hours=2