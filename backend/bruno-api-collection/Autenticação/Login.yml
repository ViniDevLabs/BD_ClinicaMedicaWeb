info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{API_URL}}/auth/login"
  body:
    type: json
    data: |-
      {
        "cpf": "11111111111",
        "senha": "senha123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setEnvVar("token", res.body.token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
