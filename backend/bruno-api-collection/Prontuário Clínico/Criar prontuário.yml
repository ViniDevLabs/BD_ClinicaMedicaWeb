info:
  name: Criar prontuário
  type: http
  seq: 1

http:
  method: POST
  url: "{{API_URL}}/prontuarios"
  body:
    type: json
    data: |-
      {
        "idAgendamento": 1,
        "diagnostico": "Faringite viral",
        "prescricao": "Repouso e hidratação. Analgésico se dor.",
        "registroObservacoes": "Retornar em 7 dias se sintomas persistirem."
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
