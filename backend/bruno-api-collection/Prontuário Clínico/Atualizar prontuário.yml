info:
  name: Atualizar prontuário
  type: http
  seq: 5

http:
  method: PUT
  url: "{{API_URL}}/prontuarios/1"
  body:
    type: json
    data: |-
      {
        "idAgendamento": 1,
        "diagnostico": "Faringite bacteriana",
        "prescricao": "Amoxicilina 500mg 8/8h por 7 dias.",
