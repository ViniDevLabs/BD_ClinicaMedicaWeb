info:
  name: Criar exame
  type: http
  seq: 1

http:
  method: POST
  url: "{{API_URL}}/exames"
  body:
    type: json
    data: |-
      {
        "idAgendamento": 1,
        "nomeExame": "Hemograma completo",
        "dataSolicitacao": "2026-07-10",
        "localRealizacao": "INTERNO",
        "observacoesMedicas": "Solicitado em jejum de 8 horas.",
